<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Meta Bulk Pay Now</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --surface2: #f5f6f7;
      --border: #ccd0d5;
      --accent: #1877f2;
      --success: #42b72a;
      --warn: #f0ad4e;
      --error: #fa383e;
      --text: #1c1e21;
      --text2: #606770;
      --text3: #8d949e;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      width: 370px;
      background: var(--bg);
      min-height: 430px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
    }

    .hdr {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hdr-icon {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: var(--accent);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .hdr-title { font-size: 13px; font-weight: 800; line-height: 1; }
    .hdr-sub { font-size: 10px; color: var(--text2); margin-top: 2px; }

    .hdr-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .badge {
      font-family: var(--mono);
      font-size: 9px;
      padding: 2px 7px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text3);
    }
    .badge.running { border-color: var(--success); color: var(--success); }
    .badge.done { border-color: var(--accent); color: var(--accent); }

    .hdr-btn {
      min-height: 24px;
      padding: 3px 7px;
      border-radius: 5px;
      font-size: 10px;
    }

    .hdr-icon-btn {
      width: 24px;
      min-height: 24px;
      padding: 0;
      font-size: 12px;
      line-height: 1;
    }

    .panel {
      padding: 10px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 5px;
      text-align: center;
    }

    .stat-v {
      font-size: 15px;
      font-weight: 800;
      line-height: 1;
    }

    .stat-l {
      margin-top: 2px;
      font-size: 9px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .prog-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 9px;
    }

    .prog-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 5px;
    }

    .prog-bar {
      height: 5px;
      border-radius: 3px;
      overflow: hidden;
      background: #e4e6eb;
    }

    .prog-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent), var(--success));
      transition: width 0.3s ease;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 7px;
      border: 1px solid transparent;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--sans);
      transition: all 0.15s ease;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-ghost { background: var(--surface); border-color: var(--border); color: var(--text2); }
    .btn-ghost:hover:not(:disabled) { color: var(--text); }
    .btn.flex1 { flex: 1; }

    .log {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      height: 280px;
      overflow-y: auto;
      font-family: var(--mono);
      font-size: 10px;
      line-height: 1.6;
      padding: 7px 9px;
    }

    .muted { color: var(--text3); }
    .log-ts { color: var(--text3); margin-right: 6px; }
  </style>
</head>
<body>

<div class="hdr">
  <div class="hdr-icon">💳</div>
  <div>
    <div class="hdr-title">Meta Bulk Pay Now</div>
    <div class="hdr-sub">Minimal runner popup</div>
  </div>
  <div class="hdr-right">
    <div class="badge" id="badge">IDLE</div>
    <button class="btn btn-ghost hdr-btn" id="openDashboardBtn">Dashboard</button>
    <button
      class="btn btn-ghost hdr-btn hdr-icon-btn"
      id="refreshBtn"
      aria-label="Refresh"
      title="Refresh"
    >
      ↻
    </button>
  </div>
</div>

<div class="panel">
  <div class="stats">
    <div class="stat"><div class="stat-v" style="color:var(--accent)" id="st-total">0</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--warn)" id="st-pending">0</div><div class="stat-l">Pending</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--success)" id="st-success">0</div><div class="stat-l">Paid</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--error)" id="st-failed">0</div><div class="stat-l">Failed</div></div>
  </div>

  <div class="prog-wrap">
    <div class="prog-row">
      <span id="progLabel">Waiting for queue</span>
      <span id="progPct">0%</span>
    </div>
    <div class="prog-bar">
      <div class="prog-fill" id="progFill"></div>
    </div>
  </div>

  <div class="log" id="logBox">
    <div class="muted">Waiting to start…</div>
  </div>
</div>

<script src="../shared/dashboard-config.js"></script>
<script src="popup.js"></script>
</body>
</html>
